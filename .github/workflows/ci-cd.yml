name: CI/CD Pipeline - DecodeLabs Project 3

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build Stage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Verify Project Files
        run: |
          echo "Build Stage Started"
          echo "Checking project files..."
          ls -la
          echo "Build Stage Passed!"

  test:
    name: Test Stage
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Validate HTML File Exists
        run: |
          echo "Test Stage Started"
          if [ -f "index.html" ]; then
            echo "index.html found!"
          else
            echo "index.html missing!"
            exit 1
          fi

      - name: Validate CSS File Exists
        run: |
          if [ -f "style.css" ]; then
            echo "style.css found!"
          else
            echo "style.css missing!"
            exit 1
          fi
          echo "All Tests Passed!"

  deploy:
    name: Deploy Stage
    runs-on: ubuntu-latest
    needs: test
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4